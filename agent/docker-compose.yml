services:
  agent:
    container_name: gate_controller_agent
    build: .
    environment:
      GATE_CONTROLLER_AGENT_TOKEN: "${GATE_CONTROLLER_AGENT_TOKEN:?set GATE_CONTROLLER_AGENT_TOKEN}"
      GATE_CONTROLLER_AGENT_DRY_RUN: ${GATE_CONTROLLER_AGENT_DRY_RUN:-}
      GATE_CONTROLLER_AGENT_RUN_ONCE: ${GATE_CONTROLLER_AGENT_RUN_ONCE:-}
      GATE_CONTROLLER_STATUS_URL: ${GATE_CONTROLLER_STATUS_URL:-}
    volumes:
      - ./:/workspace
      - /dev/mem:/dev/mem
    privileged: true # required for /dev/mem passthrough
    command: python /workspace/main.py
    restart: always
